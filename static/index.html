<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 无人机操控</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4e8;
    --text-dim: #8b949e;
    --primary: #58a6ff;
    --success: #3fb950;
    --warning: #d29922;
    --danger: #f85149;
    --user-bg: #1f3a5f;
    --agent-bg: #1a1d27;
    --tool-bg: #1a2332;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 顶栏 */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header h1 .icon { margin-right: 6px; }
  .header .status {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--text-dim);
  }
  .header .status .dot { width: 8px; height: 8px; border-radius: 50%; }
  .header .status .dot.online { background: var(--success); }

  /* 聊天区域 */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid #2d5a8e;
  }
  .message.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border: 1px solid var(--border);
  }
  .message.tool {
    align-self: flex-start;
    background: var(--tool-bg);
    border: 1px solid #1f4a6b;
    border-left: 3px solid var(--primary);
  }
  .message.tool .tool-name {
    font-size: 12px; color: var(--primary); margin-bottom: 4px;
    font-weight: 600;
  }
  .message.tool .tool-input {
    font-size: 12px; color: var(--text-dim); margin-bottom: 4px;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .message.tool .tool-output {
    color: var(--success);
    font-size: 13px;
  }
  .message.error {
    align-self: center;
    background: #2d1215;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-size: 13px;
  }
  .message.system {
    align-self: center;
    font-size: 12px;
    color: var(--text-dim);
    background: none;
    border: none;
    padding: 4px 0;
  }

  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 16px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* 输入区域 */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: var(--primary); }
  .input-area input::placeholder { color: var(--text-dim); }
  .input-area button {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .input-area button:hover { opacity: 0.85; }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 快捷指令 */
  .quick-cmds {
    padding: 8px 20px;
    display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .quick-cmds button {
    background: var(--tool-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-cmds button:hover { border-color: var(--primary); color: var(--primary); }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
  <h1><span class="icon">🚁</span>AI Agent 无人机操控</h1>
  <div class="status">
    <span id="droneInfo">加载中...</span>
    <span class="dot online" id="statusDot"></span>
  </div>
</div>

<!-- 聊天消息 -->
<div class="chat" id="chat">
  <div class="message agent">
    👋 你好！我是 AI Agent Copilot。<br>
    用自然语言给我下指令，比如：<br>
    <code style="color:var(--primary);font-size:13px">
    飞到 (31.03, 121.44) 高度 80m，录制 60 秒视频，然后返航
    </code>
  </div>
</div>

<!-- 快捷指令 -->
<div class="quick-cmds" id="quickCmds">
  <button data-cmd="查询当前状态">📡 查询状态</button>
  <button data-cmd="飞到 (31.03, 121.44) 高度 80m，拍照 3 张，然后返航">🛫 飞行+拍照+返航</button>
  <button data-cmd="飞到 (31.03, 121.44) 高度 80m，录制 60 秒视频，然后返航">🎥 飞行+录像+返航</button>
  <button data-cmd="云台垂直向下，拍照">📸 云台向下拍照</button>
</div>

<!-- 输入区域 -->
<div class="input-area">
  <input type="text" id="userInput" placeholder="输入自然语言指令，例如：飞到 (31.03, 121.44) 高度 80m，拍照 3 张"
         autocomplete="off">
  <button id="sendBtn" onclick="sendMessage()">发送</button>
</div>

<script>
// ── 状态 ────────────────────────────────────────
let isStreaming = false;

// ── DOM 引用 ─────────────────────────────────────
const chat     = document.getElementById('chat');
const input    = document.getElementById('userInput');
const sendBtn  = document.getElementById('sendBtn');
const droneInfo = document.getElementById('droneInfo');

// ── 工具函数 ─────────────────────────────────────

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function addMessage(type, content) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerHTML = content;
  chat.appendChild(div);
  scrollBottom();
}

function addToolMessage(toolName, toolInput, output) {
  const div = document.createElement('div');
  div.className = 'message tool';
  let html = `<div class="tool-name">🔧 ${toolName}</div>`;
  if (toolInput) html += `<div class="tool-input">参数: ${escapeHtml(toolInput)}</div>`;
  html += `<div class="tool-output">${escapeHtml(output)}</div>`;
  div.innerHTML = html;
  chat.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function setLoading(loading) {
  isStreaming = loading;
  sendBtn.disabled = loading;
  input.disabled = loading;
  if (loading) {
    addTyping();
  } else {
    removeTyping();
  }
}

// ── SSE 流式请求 ─────────────────────────────────

async function sendMessage() {
  const message = input.value.trim();
  if (!message || isStreaming) return;

  input.value = '';
  addMessage('user', escapeHtml(message));
  setLoading(true);

  try {
    const response = await fetch('/api/agent/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || '请求失败');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';  // 保留不完整行

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);

        // 移除打字指示器（第一条真实消息到达时）
        removeTyping();

        try {
          const event = JSON.parse(data);
          handleSSEEvent(event);
        } catch (e) {
          console.warn('SSE parse error:', e, data);
        }
      }
    }
  } catch (e) {
    removeTyping();
    addMessage('error', '❌ ' + escapeHtml(e.message));
  } finally {
    setLoading(false);
    fetchDroneStatus();  // 刷新状态
  }
}

function handleSSEEvent(event) {
  switch (event.type) {
    case 'action':
      // 工具调用开始 — 创建一个待填充的 tool 消息
      const div = document.createElement('div');
      div.className = 'message tool';
      div.id = 'tool-' + Date.now();
      div.innerHTML = `<div class="tool-name">🔧 ${event.tool}</div>
                       <div class="tool-input">参数: ${escapeHtml(event.input)}</div>
                       <div class="tool-output" style="color:var(--warning)">⏳ 执行中...</div>`;
      chat.appendChild(div);
      // 记录最后一个 tool 消息的 id，供 tool_result 更新
      div.dataset.pending = 'true';
      // 把之前 pending 的标记清除
      document.querySelectorAll('.message.tool[data-pending]').forEach(el => {
        if (el !== div) delete el.dataset.pending;
      });
      scrollBottom();
      break;

    case 'tool_result':
      // 更新最后一个 pending 的 tool 消息
      const pending = document.querySelector('.message.tool[data-pending]');
      if (pending) {
        const outputEl = pending.querySelector('.tool-output');
        if (outputEl) {
          outputEl.style.color = 'var(--success)';
          outputEl.textContent = event.output;
        }
        delete pending.dataset.pending;
      } else {
        addToolMessage('', '', event.output);
      }
      scrollBottom();
      break;

    case 'finish':
      addMessage('agent', escapeHtml(event.output));
      scrollBottom();
      break;

    case 'error':
      addMessage('error', '❌ ' + escapeHtml(event.message));
      scrollBottom();
      break;
  }
}

// ── 状态轮询 ─────────────────────────────────────

async function fetchDroneStatus() {
  try {
    const resp = await fetch('/api/agent/status');
    const data = await resp.json();
    const lines = data.status.split('\n');
    const battery = lines.find(l => l.includes('电量'));
    droneInfo.textContent = battery ? battery.trim() : data.device_id;
  } catch (e) {
    // ignore
  }
}

// ── 初始化 ─────────────────────────────────────

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('quickCmds').addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') {
    input.value = e.target.dataset.cmd;
    sendMessage();
  }
});

fetchDroneStatus();
setInterval(fetchDroneStatus, 15000);
</script>
</body>
</html>
