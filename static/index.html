<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent · 无人机操控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0a0d12;--surface:#0f1319;--card:#11171e;--border:rgba(255,255,255,.06);
    --text:#d9dde3;--text-dim:#788290;--text-muted:#545e6c;
    --cyan:#00c8e8;--cyan-glow:rgba(0,200,232,.18);--cyan-subtle:rgba(0,200,232,.06);
    --amber:#f0a800;--amber-glow:rgba(240,168,0,.15);
    --green:#2dd46e;--green-glow:rgba(45,212,110,.15);
    --red:#f04343;--red-glow:rgba(240,67,67,.2);
    --radius:6px;--radius-lg:8px;
    --font-mono:'JetBrains Mono','SF Mono',Menlo,monospace;
    --font-ui:'DM Sans',-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;
  }

  body{
    font-family:var(--font-ui);background:var(--bg);color:var(--text);
    height:100vh;display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse at 50% 0%,rgba(0,200,232,.04) 0%,transparent 60%),
      radial-gradient(ellipse at 85% 100%,rgba(240,168,0,.03) 0%,transparent 40%);
  }

  /* ── scrollbar ── */
  .chat::-webkit-scrollbar{width:3px}
  .chat::-webkit-scrollbar-track{background:transparent}
  .chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

  /* ── 顶栏 ── */
  .header{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 24px;height:52px;display:flex;align-items:center;
    justify-content:space-between;flex-shrink:0;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  }
  .header h1{
    font-family:var(--font-mono);font-size:13px;font-weight:500;
    letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .header h1::before{
    content:'';width:6px;height:6px;background:var(--cyan);
    border-radius:50%;box-shadow:0 0 6px var(--cyan);
  }
  .header .status{
    display:flex;align-items:center;gap:16px;
  }
  .header .dot{
    width:5px;height:5px;border-radius:50%;background:var(--green);
    box-shadow:0 0 5px var(--green-glow);animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  #droneInfo{
    font-family:var(--font-mono);font-size:11px;color:var(--text-dim);
    background:rgba(255,255,255,.03);border:1px solid var(--border);
    border-radius:var(--radius);padding:4px 10px;letter-spacing:.5px;
  }

  .stop-btn{
    font-family:var(--font-mono);font-size:10px;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--red);background:transparent;border:1px solid rgba(240,67,67,.25);
    border-radius:var(--radius);padding:6px 14px;cursor:pointer;
    transition:all .2s;
  }
  .stop-btn:hover{
    background:rgba(240,67,67,.08);border-color:rgba(240,67,67,.5);
    box-shadow:0 0 14px rgba(240,67,67,.15);
  }
  .stop-btn:active{background:rgba(240,67,67,.14)}
  .stop-btn:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}

  /* ── 聊天 ── */
  .chat{
    flex:1;overflow-y:auto;padding:28px 24px 20px;
    display:flex;flex-direction:column;gap:16px;
  }
  .chat .empty{
    flex:1;display:flex;align-items:center;justify-content:center;
    color:var(--text-muted);font-size:13px;text-align:center;line-height:2.2;
    font-family:var(--font-mono);letter-spacing:.5px;
  }

  /* ── 消息 ── */
  .msg{
    max-width:80%;padding:10px 16px;border-radius:var(--radius-lg);
    font-size:13px;line-height:1.65;
    animation:msgIn .3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{
    align-self:flex-end;
    background:rgba(0,200,232,.08);border:1px solid rgba(0,200,232,.15);
    border-bottom-right-radius:2px;
  }
  .msg.agent{
    align-self:flex-start;
    background:var(--surface);border:1px solid var(--border);
    border-bottom-left-radius:2px;
  }
  .msg.error{
    align-self:center;font-family:var(--font-mono);font-size:11px;
    background:rgba(240,67,67,.06);border:1px solid rgba(240,67,67,.2);
    color:var(--red);max-width:95%;
  }
  .msg.stop{
    align-self:center;max-width:95%;
    background:rgba(240,67,67,.04);border:1px solid rgba(240,67,67,.25);
    color:#f87171;text-align:center;font-weight:600;font-size:12px;
    font-family:var(--font-mono);letter-spacing:.5px;
  }
  .session-divider{
    align-self:center;display:flex;align-items:center;gap:16px;
    width:100%;padding:4px 0;color:var(--text-muted);
    font-family:var(--font-mono);font-size:10px;letter-spacing:1px;
    user-select:none;
  }
  .session-divider::before,.session-divider::after{
    content:'';flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--border),transparent);
  }

  /* ── 规划卡片 ── */
  .plan-card{
    align-self:flex-start;width:100%;max-width:640px;
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
    overflow:hidden;
  }
  .plan-card .plan-header{
    padding:16px 20px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;
  }
  .plan-card .plan-header .icon{font-size:15px}
  .plan-card .plan-header h3{
    font-family:var(--font-mono);font-size:12px;font-weight:500;
    letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);flex:1;
  }
  .plan-card .plan-body{padding:18px 20px}
  .plan-card .objective{
    font-size:13px;color:var(--text);
    padding:12px 16px;margin-bottom:18px;
    background:rgba(0,200,232,.04);border-radius:var(--radius);
    border-left:2px solid var(--cyan);line-height:1.6;
  }
  .plan-card .steps-title{
    font-family:var(--font-mono);font-size:10px;color:var(--text-muted);
    margin-bottom:10px;letter-spacing:1.5px;text-transform:uppercase;
  }
  .plan-card .step{
    display:flex;align-items:center;gap:12px;padding:8px 0;
    font-size:13px;color:var(--text);
  }
  .plan-card .step .step-icon{
    width:26px;height:26px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:10px;flex-shrink:0;
    transition:all .3s;
  }
  .plan-card .step .step-icon.pending{
    border:1.5px solid var(--border);color:var(--text-muted);
    background:rgba(255,255,255,.01);
  }
  .plan-card .step .step-icon.running{
    border:1.5px solid var(--cyan);color:var(--cyan);
    animation:spin .8s linear infinite;box-shadow:0 0 8px var(--cyan-glow);
  }
  .plan-card .step .step-icon.done{
    background:var(--green);color:#0a0d12;border:1.5px solid var(--green);
    box-shadow:0 0 6px var(--green-glow);
  }
  .plan-card .step .step-icon.fail{
    background:var(--red);color:#fff;border:1.5px solid var(--red);
    box-shadow:0 0 6px var(--red-glow);
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .plan-card .step .step-desc{flex:1;font-size:13px}
  .plan-card .step .step-result{
    font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
    max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .plan-card .preflight{
    padding:10px 14px;margin-top:14px;
    background:rgba(240,168,0,.04);border:1px solid rgba(240,168,0,.1);
    border-radius:var(--radius);
    font-family:var(--font-mono);font-size:10px;color:var(--amber);
    letter-spacing:.5px;
  }
  .plan-card .preflight span{margin-right:20px;opacity:.8}
  .plan-card .plan-actions{
    display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);
    background:rgba(0,0,0,.15);
  }
  .plan-card .plan-actions button{
    flex:1;padding:10px 20px;border-radius:var(--radius);
    font-family:var(--font-mono);font-size:11px;font-weight:600;
    letter-spacing:1.5px;text-transform:uppercase;
    cursor:pointer;border:none;transition:all .2s;
  }
  .plan-card .plan-actions button:hover{transform:translateY(-1px)}
  .plan-card .plan-actions button:active{transform:translateY(0)}
  .plan-card .plan-actions .btn-execute{
    background:var(--cyan);color:#0a0d12;
    box-shadow:0 0 14px var(--cyan-glow);
  }
  .plan-card .plan-actions .btn-execute:hover{box-shadow:0 0 22px var(--cyan-glow)}
  .plan-card .plan-actions .btn-cancel{
    background:transparent;color:var(--text-dim);border:1px solid var(--border);
  }
  .plan-card .plan-actions .btn-cancel:hover{color:var(--text);border-color:var(--text-dim)}
  .plan-card .plan-actions button:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

  /* ── 快捷指令 ── */
  .quick-cmds{
    padding:8px 24px 10px;display:flex;gap:8px;flex-wrap:wrap;
    background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;
  }
  .quick-cmds button{
    font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;
    background:transparent;border:1px solid var(--border);
    color:var(--text-dim);border-radius:20px;padding:5px 14px;
    cursor:pointer;transition:all .2s;
  }
  .quick-cmds button:hover{
    border-color:rgba(0,200,232,.3);color:var(--cyan);
    background:rgba(0,200,232,.04);
  }

  /* ── 输入 ── */
  .input-area{
    background:var(--surface);border-top:1px solid var(--border);
    padding:14px 24px;display:flex;gap:12px;flex-shrink:0;
  }
  .input-area input{
    flex:1;background:var(--bg);border:1px solid var(--border);
    border-radius:var(--radius);padding:10px 16px;color:var(--text);
    font-family:var(--font-ui);font-size:13px;outline:none;
    transition:border-color .25s,box-shadow .25s;
  }
  .input-area input:focus{
    border-color:rgba(0,200,232,.35);
    box-shadow:0 0 0 3px var(--cyan-glow);
  }
  .input-area input::placeholder{color:var(--text-muted);font-family:var(--font-mono);font-size:11px}
  .input-area button{
    font-family:var(--font-mono);font-size:11px;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;
    background:var(--cyan);color:#0a0d12;
    border:none;border-radius:var(--radius);padding:10px 24px;
    cursor:pointer;transition:all .2s;
    box-shadow:0 0 14px var(--cyan-glow);
  }
  .input-area button:hover{transform:translateY(-1px);box-shadow:0 0 22px var(--cyan-glow)}
  .input-area button:active{transform:translateY(0)}
  .input-area button:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
</style>
</head>
<body>

<div class="header">
  <h1>COPILOT · UAS</h1>
  <div class="status">
    <span id="droneInfo">加载中...</span>
    <span class="dot"></span>
    <button class="stop-btn" id="stopBtn" onclick="emergencyStop()">急停</button>
  </div>
</div>

<div class="chat" id="chat">
  <div class="empty">输入指令以操控无人机<br><span style="color:var(--cyan)">"飞到陆家嘴 · 变焦 7x 拍照 · 返航"</span></div>
</div>

<div class="quick-cmds" id="quickCmds">
  <button data-cmd="飞到陆家嘴，拍照 3 张，然后返航">🛫 飞行+拍照+返航</button>
  <button data-cmd="飞到陆家嘴，变焦 7x，录制 60 秒视频，然后返航">🎥 飞行+录像+返航</button>
  <button data-cmd="向前飞 700m，拍照">➡️ 相对飞行拍照</button>
  <button data-cmd="变焦到 7x，拍照">🔍 变焦拍照</button>
  <button data-cmd="切换到红外镜头，云台向下，全景拍照">🌡️ 红外全景</button>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="输入指令，例如：飞到陆家嘴，拍照，返航" autocomplete="off">
  <button id="sendBtn" onclick="sendMessage()">发送</button>
</div>

<script>
let isStreaming = false;
let isEmergencyStopped = false;
let abortController = null;
let currentPlanCard = null;
let currentPlanData = null;

const chat=document.getElementById('chat'),input=document.getElementById('userInput'),
  sendBtn=document.getElementById('sendBtn'),stopBtn=document.getElementById('stopBtn'),
  droneInfo=document.getElementById('droneInfo');

function scrollBottom(){chat.scrollTop=chat.scrollHeight}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function addMsg(type,html){const d=document.createElement('div');d.className='msg '+type;d.innerHTML=html;chat.appendChild(d);scrollBottom();return d}

async function emergencyStop(){
  if(!isStreaming&&!isEmergencyStopped)return;
  if(abortController){abortController.abort();abortController=null}
  try{await fetch('/api/agent/stop',{method:'POST'})}catch(e){}
  isEmergencyStopped=true;isStreaming=false;stopBtn.disabled=true;stopBtn.textContent='已急停';
  sendBtn.disabled=false;input.disabled=false;
  if(currentPlanCard)currentPlanCard.querySelectorAll('.btn-cancel,.btn-execute').forEach(b=>b.disabled=true);
  addMsg('stop','⛔ 紧急停止：无人机已原地悬停，所有任务已终止<br><span style="font-size:11px;opacity:.7">急停指令直达无人机 · 不经过 AI 处理</span>');
  const d=document.createElement('div');d.className='session-divider';d.textContent='急停 · 会话终止 —— 新会话';chat.appendChild(d);scrollBottom();
  setTimeout(fetchStatus,500)
}

async function fetchStatus(){
  try{const r=await fetch('/api/agent/status');const d=await r.json();const l=d.status.split('\n');const b=l.find(x=>x.includes('电量'));droneInfo.textContent=b?b.trim():d.device_id}catch(e){}
}

async function sendMessage(){
  const msg=input.value.trim();
  if(!msg||isStreaming)return;
  input.value='';isEmergencyStopped=false;stopBtn.disabled=false;stopBtn.textContent='急停';
  try{await fetch('/api/agent/reset',{method:'POST'})}catch(e){}
  const wasStopped=isEmergencyStopped;isEmergencyStopped=false;
  if(wasStopped){const d=document.createElement('div');d.className='session-divider';d.textContent='新会话';chat.appendChild(d)}
  const empty=chat.querySelector('.empty');if(empty)empty.remove();
  addMsg('user',escapeHtml(msg));
  isStreaming=true;sendBtn.disabled=true;input.disabled=true;
  try{
    const resp=await fetch('/api/agent/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.detail||'规划失败')}
    const data=await resp.json();
    renderPlanCard(data.plan);
  }catch(e){
    addMsg('error','❌ '+escapeHtml(e.message));
    isStreaming=false;sendBtn.disabled=false;input.disabled=false;
  }
}

function renderPlanCard(plan){
  currentPlanData=plan;
  const steps=plan.steps||[],preflight=plan.preflight||{};
  let stepsHtml='';
  steps.forEach((s,i)=>{
    stepsHtml+=`<div class="step" id="step-${i}">
      <div class="step-icon pending">${i+1}</div>
      <div class="step-desc">${escapeHtml(s.description)}</div>
      <div class="step-result"></div>
    </div>`;
  });
  const card=document.createElement('div');
  card.className='plan-card';
  card.innerHTML=`
    <div class="plan-header"><span class="icon">◈</span><h3>任务规划</h3></div>
    <div class="plan-body">
      <div class="objective">${escapeHtml(plan.objective)}</div>
      <div class="steps-title">执行序列 · ${steps.length} 步</div>
      ${stepsHtml}
      <div class="preflight">
        ◈ 返航高度: ${escapeHtml(preflight.return_altitude||'100m')}  ◈ 失联动作: ${escapeHtml(preflight.lost_action||'返航')}
      </div>
    </div>
    <div class="plan-actions">
      <button class="btn-cancel" onclick="cancelPlan(this)">取消</button>
      <button class="btn-execute" onclick="executePlan(this)">执行</button>
    </div>`;
  chat.appendChild(card);
  currentPlanCard=card;
  scrollBottom();
}

function cancelPlan(btn){
  btn.disabled=true;
  btn.parentElement.querySelector('.btn-execute').disabled=true;
  addMsg('agent','⏹ 已取消');
  isStreaming=false;sendBtn.disabled=false;input.disabled=false;
}

async function executePlan(btn){
  btn.disabled=true;
  btn.parentElement.querySelector('.btn-cancel').disabled=true;
  btn.textContent='执行中...';
  const plan=currentPlanData;
  if(!plan){addMsg('error','❌ 规划数据丢失');return}
  const planStr=JSON.stringify(plan);
  const steps=plan.steps||[];
  abortController=new AbortController();
  try{
    const resp=await fetch('/api/agent/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:planStr}),signal:abortController.signal});
    if(!resp.ok){const e=await resp.json();throw new Error(e.detail||'执行失败')}
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{const evt=JSON.parse(line.slice(6));handleStepEvent(evt,steps)}catch(e){}
      }
    }
  }catch(e){
    if(e.name!=='AbortError')addMsg('error','❌ '+escapeHtml(e.message))
  }finally{
    isStreaming=false;sendBtn.disabled=false;input.disabled=false;
    abortController=null;btn.textContent='完成';fetchStatus()
  }
}

function handleStepEvent(evt,steps){
  const card=currentPlanCard;
  if(!card)return;
  if(evt.type==='step_start'){
    const el=document.getElementById('step-'+evt.index);
    if(el){
      const icon=el.querySelector('.step-icon');
      icon.className='step-icon running';icon.textContent='';
      el.scrollIntoView({behavior:'smooth',block:'center'});
    }
  }else if(evt.type==='step_done'){
    const el=document.getElementById('step-'+evt.index);
    if(el){
      const icon=el.querySelector('.step-icon');
      icon.className='step-icon done';icon.textContent='✓';
      const result=el.querySelector('.step-result');
      if(result)result.textContent=evt.result.replace(/^✅\s*/,'').substring(0,60);
    }
  }else if(evt.type==='step_error'){
    const el=document.getElementById('step-'+evt.index);
    if(el){
      const icon=el.querySelector('.step-icon');
      icon.className='step-icon fail';icon.textContent='✗';
      const result=el.querySelector('.step-result');
      if(result){result.style.color='var(--red)';result.textContent=evt.error.substring(0,60)}
    }
  }else if(evt.type==='all_done'){
    addMsg('agent','✅ '+escapeHtml(evt.summary||'任务执行完成'));
    const btns=card.querySelectorAll('button');btns.forEach(b=>b.disabled=true);
    scrollBottom()
  }
}

input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
document.getElementById('quickCmds').addEventListener('click',e=>{if(e.target.tagName==='BUTTON'){input.value=e.target.dataset.cmd;sendMessage()}});
fetchStatus();setInterval(fetchStatus,15000);
</script>
</body>
</html>
